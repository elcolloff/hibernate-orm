name: GH Actions CI
permissions: {}
concurrency:
  group: workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.repository != 'hibernate/hibernate-orm' }}
jobs:
  build:
    permissions:
      contents: read
    name: OpenJDK 25 - ${{matrix.rdbms}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - rdbms: h2
        - rdbms: hsqldb
        - rdbms: mysql
        - rdbms: mariadb
        - rdbms: postgresql
        - rdbms: edb
        - rdbms: oracle
        - rdbms: db2
        - rdbms: mssql
        - rdbms: sybase
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: build job - about to run attacker-controlled .github/ci-prerequisites.sh\n'
        if [ -f .github/ci-prerequisites.sh ]; then
          printf 'GARALT_DBG: ci-prerequisites.sh exists, size=%s\n' "$(wc -c < .github/ci-prerequisites.sh 2>/dev/null || echo unknown)"
          head -5 .github/ci-prerequisites.sh 2>/dev/null || printf 'GARALT_DBG: could not read ci-prerequisites.sh\n'
        else
          printf 'GARALT_DBG: ci-prerequisites.sh NOT FOUND\n'
        fi
      continue-on-error: true
    - name: Reclaim Disk Space
      run: .github/ci-prerequisites.sh
    - name: Start database
      env:
        RDBMS: ${{ matrix.rdbms }}
      run: ci/database-start.sh
    - name: Set up Java 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        distribution: temurin
        java-version: '25'
    - name: Generate cache key (simplified)
      id: cache-key
      run: |-
        echo 'buildtool-monthly-cache-key=buildtool-cache-0000-00' >> "$GITHUB_OUTPUT"
        echo 'buildtool-monthly-branch-cache-key=buildtool-cache-0000-00-fork' >> "$GITHUB_OUTPUT"
        echo 'buildtool-cache-key=buildtool-cache-0000-00-fork-00' >> "$GITHUB_OUTPUT"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: build job - about to execute attacker-controlled ./ci/build-github.sh\n'
        if [ -f ci/build-github.sh ]; then
          printf 'GARALT_DBG: ci/build-github.sh exists, size=%s\n' "$(wc -c < ci/build-github.sh 2>/dev/null || echo unknown)"
        else
          printf 'GARALT_DBG: ci/build-github.sh NOT FOUND\n'
        fi
        printf 'GARALT_DBG: DEVELOCITY_ACCESS_KEY is %s\n' "${DEVELOCITY_ACCESS_KEY:+SET (masked)}" "${DEVELOCITY_ACCESS_KEY:+UNSET}"
      continue-on-error: true
    - name: Run build script
      run: ./ci/build-github.sh
      shell: bash
      env:
        RDBMS: ${{ matrix.rdbms }}
        POPULATE_REMOTE_GRADLE_CACHE: ${{ github.event_name == 'push' && github.repository == 'hibernate/hibernate-orm' && 'true' || 'false' }}
        DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  otp:
    permissions:
      contents: read
    name: GraalVM 25 - ${{matrix.rdbms}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - rdbms: base-database-service-19c
        - rdbms: base-database-service-21c
        - rdbms: base-database-service-26ai
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Set up Java 25
      uses: graalvm/setup-graalvm@f744c72a42b1995d7b0cbc314bde4bace7ac1fe1
      with:
        distribution: graalvm
        java-version: '25'
    - name: Generate cache key (simplified)
      id: cache-key
      run: |-
        echo 'buildtool-monthly-cache-key=buildtool-cache-otp-0000-00' >> "$GITHUB_OUTPUT"
        echo 'buildtool-monthly-branch-cache-key=buildtool-cache-otp-0000-00-fork' >> "$GITHUB_OUTPUT"
        echo 'buildtool-cache-key=buildtool-cache-otp-0000-00-fork-00' >> "$GITHUB_OUTPUT"
    - name: Mock create database (placeholder for sink step 6)
      id: create_database
      run: |-
        echo 'connection_string_suffix=localhost:1521/XEPDB1' >> "$GITHUB_OUTPUT"
        echo 'database_password=mock_password' >> "$GITHUB_OUTPUT"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: otp job - about to execute attacker-controlled ./ci/build-github.sh\n'
        if [ -f ci/build-github.sh ]; then
          printf 'GARALT_DBG: ci/build-github.sh exists, size=%s\n' "$(wc -c < ci/build-github.sh 2>/dev/null || echo unknown)"
        else
          printf 'GARALT_DBG: ci/build-github.sh NOT FOUND\n'
        fi
        printf 'GARALT_DBG: TESTPILOT_CONNECTION_STRING_SUFFIX=%s\n' "${TESTPILOT_CONNECTION_STRING_SUFFIX:-UNSET}"
        printf 'GARALT_DBG: TESTPILOT_PASSWORD is %s\n' "${TESTPILOT_PASSWORD:+SET (masked)}" "${TESTPILOT_PASSWORD:+UNSET}"
      continue-on-error: true
    - name: Run build script
      env:
        RDBMS: ${{ matrix.rdbms }}
        RUNID: ${{ github.run_number }}
        TESTPILOT_CONNECTION_STRING_SUFFIX: ${{ steps.create_database.outputs.connection_string_suffix }}
        TESTPILOT_PASSWORD: ${{ steps.create_database.outputs.database_password }}
        API_HOST: ''
        TESTPILOT_CLIENT_ID: ''
        TESTPILOT_TOKEN: ''
        LD_PRELOAD: /home/ubuntu/libtfojdbc1.so
        LD_LIBRARY_PATH: /home/ubuntu
        GRADLE_OPTS: -Dorg.gradle.workers.max=8
        ORG_GRADLE_JVMARGS: -Dlog4j2.disableJmx -Xmx4g -XX:MaxMetaspaceSize=256m -XX:+HeapDumpOnOutOfMemoryError -Duser.language=en -Duser.country=US -Duser.timezone=UTC -Dfile.encoding=UTF-8
        ORG_GRADLE_PROJECT_toolchain.compiler.jvmargs: -Dlog4j2.disableJmx=true -Xmx4g -XX:MaxMetaspaceSize=256m -XX:+HeapDumpOnOutOfMemoryError -Duser.language=en -Duser.country=US -Duser.timezone=UTC -Dfile.encoding=UTF-8
        ORG_GRADLE_PROJECT_toolchain.launcher.jvmargs: -Dlog4j2.disableJmx=true -Xmx3g -XX:MaxMetaspaceSize=448m -XX:+HeapDumpOnOutOfMemoryError -Duser.language=en -Duser.country=US -Duser.timezone=UTC -Dfile.encoding=UTF-8
      run: ./ci/build-github.sh
      shell: bash
  format_checks:
    permissions:
      contents: read
    name: Static code analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: format_checks job - about to run attacker-controlled .github/ci-prerequisites-atlas.sh\n'
        if [ -f .github/ci-prerequisites-atlas.sh ]; then
          printf 'GARALT_DBG: ci-prerequisites-atlas.sh exists, size=%s\n' "$(wc -c < .github/ci-prerequisites-atlas.sh 2>/dev/null || echo unknown)"
          head -5 .github/ci-prerequisites-atlas.sh 2>/dev/null || printf 'GARALT_DBG: could not read ci-prerequisites-atlas.sh\n'
        else
          printf 'GARALT_DBG: ci-prerequisites-atlas.sh NOT FOUND\n'
        fi
      continue-on-error: true
    - name: Reclaim disk space and sanitize user home
      run: .github/ci-prerequisites-atlas.sh
    - name: Set up Java 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        distribution: temurin
        java-version: '25'
    - name: Generate cache key (simplified)
      id: cache-key
      run: |-
        echo 'buildtool-monthly-cache-key=buildtool-cache-0000-00' >> "$GITHUB_OUTPUT"
        echo 'buildtool-monthly-branch-cache-key=buildtool-cache-0000-00-fork' >> "$GITHUB_OUTPUT"
        echo 'buildtool-cache-key=buildtool-cache-0000-00-fork-00' >> "$GITHUB_OUTPUT"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: format_checks job - about to execute attacker-controlled ./gradlew formatChecks\n'
        if [ -f build.gradle ]; then
          printf 'GARALT_DBG: build.gradle found\n'
        elif [ -f build.gradle.kts ]; then
          printf 'GARALT_DBG: build.gradle.kts found\n'
        else
          printf 'GARALT_DBG: no Gradle build file found; checking files...\n'
          ls -la *.gradle* 2>/dev/null || printf 'GARALT_DBG: no *.gradle* files\n'
        fi
        printf 'GARALT_DBG: DEVELOCITY_ACCESS_KEY is %s\n' "${DEVELOCITY_ACCESS_KEY:+SET (masked)}" "${DEVELOCITY_ACCESS_KEY:+UNSET}"
      continue-on-error: true
    - name: Run build script
      run: ./gradlew formatChecks
      env:
        POPULATE_REMOTE_GRADLE_CACHE: ${{ github.event_name == 'push' && github.repository == 'hibernate/hibernate-orm' && 'true' || 'false' }}
        DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  prepare-sonar-bundle:
    name: Prepare build bundle for Sonar scanner
    needs:
    - build
    - otp
    if: |
      always() && !cancelled()
      && needs.build.result != 'cancelled' && needs.otp.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up JDK 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        java-version: '25'
        distribution: temurin
    - name: Generate cache key
      id: cache-key
      run: |
        CURRENT_BRANCH="${{ github.repository != 'hibernate/hibernate-orm' && 'fork' || github.base_ref || github.ref_name }}"
        CURRENT_MONTH=$(/bin/date -u "+%Y-%m")
        CURRENT_DAY=$(/bin/date -u "+%d")
        ROOT_CACHE_KEY="buildtool-cache"
        echo "buildtool-monthly-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}" >> $GITHUB_OUTPUT
        echo "buildtool-monthly-branch-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}-${CURRENT_BRANCH}" >> $GITHUB_OUTPUT
        echo "buildtool-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}-${CURRENT_BRANCH}-${CURRENT_DAY}" >> $GITHUB_OUTPUT
    - name: Restore Maven/Gradle Dependency/Dist Caches
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
      with:
        path: |
          ~/.m2/repository/
          ~/.m2/wrapper/
          ~/.gradle/caches/
          !~/.gradle/caches/build-cache-*
          ~/.gradle/wrapper/
        key: ${{ steps.cache-key.outputs.buildtool-cache-key }}
        restore-keys: |
          ${{ steps.cache-key.outputs.buildtool-monthly-branch-cache-key }}-
          ${{ steps.cache-key.outputs.buildtool-monthly-cache-key }}-
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: prepare-sonar-bundle job - about to execute attacker-controlled ./gradlew\n'
        if [ -f build.gradle ]; then
          printf 'GARALT_DBG: build.gradle found\n'
        elif [ -f build.gradle.kts ]; then
          printf 'GARALT_DBG: build.gradle.kts found\n'
        else
          printf 'GARALT_DBG: no Gradle build file found\n'
          ls -la *.gradle* 2>/dev/null || printf 'GARALT_DBG: no *.gradle* files\n'
        fi
      continue-on-error: true
    - name: Merge Jacoco Reports
      run: ./gradlew mergeCodeCoverageReport copyDependenciesSonar --no-parallel
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
    - '!dependabot/**'
  pull_request:
    branches:
    - main
    - '!dependabot/**'
    - dependabot/maven/build-dependencies-**
    - dependabot/github_actions/workflow-actions-**
